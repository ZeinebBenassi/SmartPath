# SmartPath - Gmail SMTP settings (Forgot Password)
#
# Recommended: use environment variables instead of committing secrets.
#   SMARTPATH_GMAIL_USER=your.address@gmail.com
#   SMARTPATH_GMAIL_APP_PASSWORD=your_gmail_app_password  (App Password, 16 chars; spaces ok)
#
# If you prefer a file-based config (not recommended for git repos), fill these:
mail.username=lola07517@gmail.com
mail.appPassword=qxoitqpcuskjhlwz


# Email provider: smtp (default) or sendgrid (API key)
#   You can also set SMARTPATH_EMAIL_PROVIDER=sendgrid
mail.provider=smtp

# Sender identity (mainly for API providers like SendGrid)
#   SMARTPATH_EMAIL_FROM=verified-sender@yourdomain.com
#   SMARTPATH_EMAIL_FROM_NAME=SmartPath
mail.from=
mail.fromName=SmartPath

# SendGrid API key MUST be provided via env var:
#   SMARTPATH_SENDGRID_API_KEY=SG.xxxxxx

# SMTP defaults for Gmail
mail.smtp.host=smtp.gmail.com
mail.smtp.port=587
mail.smtp.starttls.enable=true
mail.smtp.auth=true
